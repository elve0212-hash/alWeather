<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Lookup</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;max-width:640px;margin:2rem auto;padding:1rem}label,input{display:block;margin:0.5rem 0}button{margin-top:0.5rem}</style>
  </head>
  <body>
    <h1>Weather Lookup</h1>
    <form method="post">
      <label for="city">City</label>
      <input id="city" name="city" value="{{ city }}" placeholder="e.g. London" />
      <button type="submit">Get Weather</button>
    </form>
    <form method="post" style="margin-top:0.5rem">
      <input type="hidden" name="clear" value="1" />
      <button type="submit">Clear Cache</button>
    </form>

    {% if error %}
      <p style="color:crimson">{{ error }}</p>
    {% endif %}

    {% if message %}
      <p style="color:green">{{ message }}</p>
    {% endif %}

    {% if weather %}
      <h2>Result</h2>
      <p>{{ weather }}</p>
    {% endif %}
  </body>
</html>
